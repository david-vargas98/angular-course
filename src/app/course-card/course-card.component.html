<div class="course-card">
        <div class="course-title">
            {{cardIndex}} {{ course.description }}
        </div>

        @if(course.id == 1){
            <h1>Course with ID 1 detected!</h1>
        }
        @else if(course.iconUrl){ <!-- If there's an icon url the image will be rendered, otherwise, it won't be rendered -->
            <img width="300" alt="Angular Logo"
                 [src]="course.iconUrl">
        }
        @else{
            <h2>No image available.</h2>
        }


        <div class="course-description">
            {{ course.longDescription }}
        </div>

        <button (click)="onCourseViewed()" >View course</button>
</div>
