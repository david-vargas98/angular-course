<div class="top-menu">

    <img class="logo"
         src="https://angular-academy.s3.amazonaws.com/main-logo/main-page-logo-small-hat.png">

</div>

<div class="courses">
    <!-- "courseSelected" is a Not a standar browser event-->
     <!-- "courseSelected" - name of the event; "onCourseSelected" - parent's function  -->
      <!-- "I'm gonna listen to the personalized 'courseSelected' event, when triggered, I call "onCourseSelected" and then pass $event" -->
    <course-card (courseSelected)="onCourseSelected($event)" [course]="coreCourse"></course-card> <!--Here we add the input property [title] and assign the variable value-->

    <course-card (courseSelected)="onCourseSelected($event)" [course]="rxJsCourse"></course-card>
    
    <course-card (courseSelected)="onCourseSelected($event)" [course]="ngrxCourse"></course-card>

</div>
