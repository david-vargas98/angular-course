<div class="top-menu">

  <img class="logo"
       src="https://angular-academy.s3.amazonaws.com/main-logo/main-page-logo-small-hat.png">

</div>

<div>

  <div class="demo">
    <button (click)="onEditCourse()" i18n>Edit Course</button>
    
    <div i18n>{coursesTotal, plural, =0 {No courses available.} =1 {One course is available.} other {A total of {{coursesTotal}} courses are available.}}</div>
    
  </div>

  <div class="courses">
    
    <!-- i18n is a custom attribute that tools such as the angular CLI are going to use to extract the string -->
     <!-- The command which needs to be run was: "ng xi18n", and now for angular 14+ is: "ng extract-i18n" -->
      <!-- Changing the message to display (content) and the meaning will change the "trans-unit id" of the translation -->
    <!-- i18n attribute is used to give a description of the message and we use pipeline to give context -->
     <!-- It has the following form: i18n="meaning|description" -->
      <!-- If we want to add manually a unique identifier we can do so by adding 2 @s and the identifier name: @@identifier-->
    <h4 i18n="welcome message|Greet the user a greeting at the beginning of the course@@WelcomeMessage">Welcome to the angular core deep dive course</h4>

    <course-card *ngFor="let course of courses"
                 [course]="course"
                 (courseChanged)="save($event)"
                 type="beginner"> <!--Another input property-->

      <course-image [src]="course.iconUrl"></course-image>

    </course-card>

  </div>


</div>
